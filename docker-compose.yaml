services:
  # Database for your Finance App
  finance-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: finance_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  # Unleash Feature Flag Server
  unleash:
    image: unleashorg/unleash-server:latest
    ports:
      - "4242:4242"
    environment:
      DATABASE_URL: "postgres://user:password@unleash-db:5432/unleash"
      DATABASE_SSL: "false"
      LOG_LEVEL: "info"
      # This is the secret for the SDK to connect
      UNLEASH_AUTH_TYPE: "none"
    depends_on:
      - unleash-db

  # Database for Unleash
  unleash-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: unleash
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password